<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso confirmado · Carolina Herrera VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .thanks-wrap {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
        }
        .thanks-card {
            max-width: 420px;
        }
        .thanks-icon {
            width: 46px;
            margin: 0 auto 22px;
        }
        .thanks-title {
            font-family: var(--serif);
            font-size: 30px;
        }
        .thanks-text {
            color: var(--muted);
            margin: 18px 0 8px;
            font-size: 15px;
        }
        .thanks-warning {
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 26px;
        }
    </style>
</head>
<body>

<div class="thanks-wrap">
    <div class="thanks-card">
        <span class="seal" style="margin: 0 auto 20px; width:52px; height:52px; font-size:18px;">
            <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#c9a227" stroke-width="1" stroke-dasharray="3 5"/></svg>
            CH
        </span>

        <h1 class="thanks-title gold-italic" style="margin-left:0;">Pago exitoso</h1>

        <p class="thanks-text">Ahora ve al bot de Telegram para activar tu acceso VIP.</p>
        <p class="thanks-warning">⚠ El acceso se activa automáticamente desde el bot.</p>

        <a href="https://t.me/CarolinaHerrera_VIP_bot" class="btn-main">
            <img src="botardo.png" alt="" class="icon-bot">
            Ir al bot
        </a>
    </div>
</div>

</body>
</html>
